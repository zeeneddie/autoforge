# mq-devEngine — Pre-commit configuratie
# Aangepast van mq-platform/templates/.pre-commit-config.yaml
# Let op: line-length = 120 (afwijkend van platform standaard 100)
#
# Installatie:
#   pip install pre-commit
#   pre-commit install
#
# Handmatig draaien:
#   pre-commit run --all-files

repos:
  # Ruff: Python linting + formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
      - id: ruff-format
        name: ruff format

  # Standaard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements

  # MyPy type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --warn-return-any]
        exclude: ^(ui/|venv/|\.venv/)

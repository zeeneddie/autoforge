<svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A4B8E"/>
      <stop offset="50%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>

  <!-- Circuit lines radiating outward -->
  <g stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.7">
    <path d="M35 30 L15 15"/>
    <path d="M30 50 L5 50"/>
    <path d="M35 70 L15 85"/>
    <path d="M95 35 L110 20"/>
    <path d="M100 55 L115 55"/>
  </g>

  <!-- Circuit dots at line ends -->
  <circle cx="15" cy="15" r="4" fill="#F97316"/>
  <circle cx="5" cy="50" r="3" fill="#60A5FA"/>
  <circle cx="15" cy="85" r="4" fill="#F97316"/>
  <circle cx="110" cy="20" r="3" fill="#60A5FA"/>
  <circle cx="115" cy="55" r="4" fill="#F97316"/>

  <!-- Main M shape -->
  <path d="M35 75 L35 25 L55 50 L75 25 L75 75"
        stroke="url(#blueGrad)"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Inner circuit detail on M -->
  <rect x="52" y="45" width="6" height="6" fill="#60A5FA" rx="1"/>

  <!-- Q tail/hook in orange -->
  <path d="M78 68 C85 78, 100 78, 105 60"
        stroke="url(#orangeGrad)"
        stroke-width="8"
        stroke-linecap="round"
        fill="none"/>
</svg>
